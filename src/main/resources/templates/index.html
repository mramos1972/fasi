<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head><title>Dashboard — FASI</title></head>
<body>
<section>
  <h2 class="text-2xl font-bold text-gray-800 mb-6">Dashboard</h2>
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
    <a th:href="@{/agenda}"
       class="bg-white rounded-xl shadow p-6 hover:shadow-md transition flex items-center gap-4">
      <span class="text-4xl">📇</span>
      <div><p class="font-semibold text-gray-800">Agenda</p><p class="text-sm text-gray-500">Gestión de contactos</p></div>
    </a>
    <a th:href="@{/tareas}"
       class="bg-white rounded-xl shadow p-6 hover:shadow-md transition flex items-center gap-4">
      <span class="text-4xl">✅</span>
      <div><p class="font-semibold text-gray-800">Tareas</p><p class="text-sm text-gray-500">Pendientes y en curso</p></div>
    </a>
    <a th:href="@{/contabilidad}"
       class="bg-white rounded-xl shadow p-6 hover:shadow-md transition flex items-center gap-4">
      <span class="text-4xl">💰</span>
      <div><p class="font-semibold text-gray-800">Contabilidad</p><p class="text-sm text-gray-500">Ingresos y gastos</p></div>
    </a>
    <a th:href="@{/documentos}"
       class="bg-white rounded-xl shadow p-6 hover:shadow-md transition flex items-center gap-4">
      <span class="text-4xl">📄</span>
      <div><p class="font-semibold text-gray-800">Documentos</p><p class="text-sm text-gray-500">Repositorio de ficheros</p></div>
    </a>
    <a th:href="@{/fotos}"
       class="bg-white rounded-xl shadow p-6 hover:shadow-md transition flex items-center gap-4">
      <span class="text-4xl">🖼️</span>
      <div><p class="font-semibold text-gray-800">Fotos</p><p class="text-sm text-gray-500">Próximamente ☁️</p></div>
    </a>
  </div>
</section>
</body>
</html>
