<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head><title>Subir documento — FASI</title></head>
<body>
<section>
  <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100 mb-6">📄 Subir documento</h2>
  <div class="bg-white dark:bg-gray-800 rounded-xl shadow p-8 max-w-lg">
    <form th:action="@{/documentos/subir}" method="post"
          enctype="multipart/form-data" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Nombre *</label>
        <input type="text" name="nombre" required
               class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-400"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Descripción</label>
        <textarea name="descripcion" rows="2"
                  class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-400"></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Categoría</label>
        <input type="text" name="categoria"
               class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-400"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Fichero *</label>
        <input type="file" name="file" required
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"/>
      </div>
      <div class="flex gap-3 pt-2">
        <button type="submit"
                class="bg-gray-900 text-white px-6 py-2 rounded-lg hover:bg-gray-700 transition">
          Subir
        </button>
        <a th:href="@{/documentos}"
           class="px-6 py-2 rounded-lg border border-gray-300 hover:bg-gray-50 transition">
          Cancelar
        </a>
      </div>
    </form>
  </div>
</section>
</body>
</html>
