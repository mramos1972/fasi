<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FASI — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-xl p-10 w-full max-w-sm">
    <h1 class="text-3xl font-bold text-center mb-2">⚡ FASI</h1>
    <p class="text-center text-gray-500 mb-8 text-sm">Full Assistant</p>
    <div th:if="${param.error}" class="bg-red-50 text-red-600 text-sm rounded-lg p-3 mb-4">
      Usuario o contraseña incorrectos.
    </div>
    <div th:if="${param.logout}" class="bg-green-50 text-green-600 text-sm rounded-lg p-3 mb-4">
      Sesión cerrada correctamente.
    </div>
    <form th:action="@{/login}" method="post" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
        <input type="text" name="username" required autofocus
               class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-gray-800"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
        <input type="password" name="password" required
               class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-gray-800"/>
      </div>
      <button type="submit"
              class="w-full bg-gray-900 text-white py-2 rounded-lg font-semibold hover:bg-gray-700 transition">
        Entrar
      </button>
    </form>
  </div>
</body>
</html>
