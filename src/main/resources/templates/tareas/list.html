<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head><title>Tareas — FASI</title></head>
<body>
<section>
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100">✅ Tareas</h2>
    <a th:href="@{/tareas/nueva}"
       class="bg-gray-900 text-white px-4 py-2 rounded-lg hover:bg-gray-700 transition text-sm">
      + Nueva tarea
    </a>
  </div>
  <div class="bg-white dark:bg-gray-800 rounded-xl shadow overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 dark:bg-gray-700 text-gray-600 dark:text-gray-300 uppercase text-xs">
        <tr>
          <th class="px-4 py-3 text-left">Título</th>
          <th class="px-4 py-3 text-left">Estado</th>
          <th class="px-4 py-3 text-left">Prioridad</th>
          <th class="px-4 py-3 text-left">Vencimiento</th>
          <th class="px-4 py-3 text-left">Acciones</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100 dark:divide-gray-700">
        <tr th:each="t : ${tareas}" class="hover:bg-gray-50 dark:hover:bg-gray-700">
          <td class="px-4 py-3 font-medium" th:text="${t.titulo}"></td>
          <td class="px-4 py-3">
            <span th:text="${t.estado}"
                  th:classappend="${t.estado.name() == 'HECHA'} ? 'bg-green-100 text-green-700' :
                                  (${t.estado.name() == 'EN_CURSO'} ? 'bg-blue-100 text-blue-700' :
                                  'bg-yellow-100 text-yellow-700')"
                  class="px-2 py-1 rounded-full text-xs font-semibold"></span>
          </td>
          <td class="px-4 py-3">
            <span th:text="${t.prioridad}"
                  th:classappend="${t.prioridad.name() == 'ALTA'} ? 'text-red-600 font-bold' :
                                  (${t.prioridad.name() == 'MEDIA'} ? 'text-yellow-600' : 'text-gray-400')"
                  class="text-xs font-semibold"></span>
          </td>
          <td class="px-4 py-3 text-gray-500" th:text="${t.fechaVencimiento}"></td>
          <td class="px-4 py-3 flex gap-2">
            <a th:href="@{/tareas/{id}/editar(id=${t.id})}"
               class="text-blue-600 hover:underline text-xs">Editar</a>
            <form th:action="@{/tareas/{id}/eliminar(id=${t.id})}" method="post"
                  onsubmit="return confirm('¿Eliminar tarea?')">
              <button type="submit" class="text-red-500 hover:underline text-xs">Eliminar</button>
            </form>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(tareas)}">
          <td colspan="5" class="px-4 py-8 text-center text-gray-400">
            No hay tareas. ¡Crea la primera!
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
</body>
</html>
