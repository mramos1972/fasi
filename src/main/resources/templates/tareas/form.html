<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head><title>Tarea — FASI</title></head>
<body>
<section>
  <h2 class="text-2xl font-bold text-gray-800 mb-6"
      th:text="${tarea.id == null} ? 'Nueva tarea' : 'Editar tarea'"></h2>
  <div class="bg-white rounded-xl shadow p-8 max-w-lg">
    <form th:action="${tarea.id == null} ? @{/tareas} : @{/tareas/{id}(id=${tarea.id})}"
          th:object="${tarea}" method="post" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Título *</label>
        <input type="text" th:field="*{titulo}" required
               class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-gray-800"/>
        <p th:if="${#fields.hasErrors('titulo')}" th:errors="*{titulo}"
           class="text-red-500 text-xs mt-1"></p>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Descripción</label>
        <textarea th:field="*{descripcion}" rows="3"
                  class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-gray-800"></textarea>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Estado *</label>
          <select th:field="*{estado}" required
                  class="w-full border border-gray-300 rounded-lg px-3 py-2">
            <option th:each="e : ${estados}" th:value="${e}" th:text="${e}"></option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Prioridad *</label>
          <select th:field="*{prioridad}" required
                  class="w-full border border-gray-300 rounded-lg px-3 py-2">
            <option th:each="p : ${prioridades}" th:value="${p}" th:text="${p}"></option>
          </select>
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de vencimiento</label>
        <input type="date" th:field="*{fechaVencimiento}"
               class="w-full border border-gray-300 rounded-lg px-3 py-2"/>
      </div>
      <div class="flex gap-3 pt-2">
        <button type="submit"
                class="bg-gray-900 text-white px-6 py-2 rounded-lg hover:bg-gray-700 transition">
          Guardar
        </button>
        <a th:href="@{/tareas}"
           class="px-6 py-2 rounded-lg border border-gray-300 hover:bg-gray-50 transition">
          Cancelar
        </a>
      </div>
    </form>
  </div>
</section>
</body>
</html>
