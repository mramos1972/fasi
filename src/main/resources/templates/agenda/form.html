<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head><title>Contacto — FASI</title></head>
<body>
<section>
  <h2 class="text-2xl font-bold text-gray-800 mb-6"
      th:text="${contacto.id == null} ? 'Nuevo contacto' : 'Editar contacto'"></h2>
  <div class="bg-white rounded-xl shadow p-8 max-w-lg">
    <form th:action="${contacto.id == null} ? @{/agenda} : @{/agenda/{id}(id=${contacto.id})}"
          th:object="${contacto}" method="post" class="space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nombre *</label>
          <input type="text" th:field="*{nombre}" required
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-gray-800"/>
          <p th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"
             class="text-red-500 text-xs mt-1"></p>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Apellidos</label>
          <input type="text" th:field="*{apellidos}"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-gray-800"/>
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" th:field="*{email}"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-gray-800"/>
        <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}"
           class="text-red-500 text-xs mt-1"></p>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Teléfono</label>
        <input type="text" th:field="*{telefono}"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-gray-800"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Notas</label>
        <textarea th:field="*{notas}" rows="3"
                  class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-gray-800"></textarea>
      </div>
      <div class="flex gap-3 pt-2">
        <button type="submit"
                class="bg-gray-900 text-white px-6 py-2 rounded-lg hover:bg-gray-700 transition">
          Guardar
        </button>
        <a th:href="@{/agenda}"
           class="px-6 py-2 rounded-lg border border-gray-300 hover:bg-gray-50 transition">
          Cancelar
        </a>
      </div>
    </form>
  </div>
</section>
</body>
</html>
