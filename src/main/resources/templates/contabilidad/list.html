<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head><title>Contabilidad — FASI</title></head>
<body>
<section>
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold text-gray-800">💰 Contabilidad</h2>
    <a th:href="@{/contabilidad/nuevo}"
       class="bg-gray-900 text-white px-4 py-2 rounded-lg hover:bg-gray-700 transition text-sm">
      + Nuevo movimiento
    </a>
  </div>
  <div class="grid grid-cols-3 gap-4 mb-6">
    <div class="bg-green-50 border border-green-200 rounded-xl p-4">
      <p class="text-xs text-green-600 font-semibold uppercase mb-1">Ingresos</p>
      <p class="text-2xl font-bold text-green-700"
         th:text="${#numbers.formatDecimal(resumen['ingresos'], 1, 2)} + ' €'"></p>
    </div>
    <div class="bg-red-50 border border-red-200 rounded-xl p-4">
      <p class="text-xs text-red-600 font-semibold uppercase mb-1">Gastos</p>
      <p class="text-2xl font-bold text-red-700"
         th:text="${#numbers.formatDecimal(resumen['gastos'], 1, 2)} + ' €'"></p>
    </div>
    <div class="bg-blue-50 border border-blue-200 rounded-xl p-4">
      <p class="text-xs text-blue-600 font-semibold uppercase mb-1">Saldo</p>
      <p class="text-2xl font-bold"
         th:classappend="${resumen['saldo'] >= 0} ? 'text-blue-700' : 'text-red-700'"
         th:text="${#numbers.formatDecimal(resumen['saldo'], 1, 2)} + ' €'"></p>
    </div>
  </div>
  <div class="bg-white rounded-xl shadow overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 text-gray-600 uppercase text-xs">
        <tr>
          <th class="px-4 py-3 text-left">Fecha</th>
          <th class="px-4 py-3 text-left">Concepto</th>
          <th class="px-4 py-3 text-left">Categoría</th>
          <th class="px-4 py-3 text-left">Tipo</th>
          <th class="px-4 py-3 text-right">Importe</th>
          <th class="px-4 py-3 text-left">Acciones</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100">
        <tr th:each="m : ${movimientos}" class="hover:bg-gray-50">
          <td class="px-4 py-3 text-gray-500" th:text="${m.fecha}"></td>
          <td class="px-4 py-3 font-medium" th:text="${m.concepto}"></td>
          <td class="px-4 py-3 text-gray-500" th:text="${m.categoria}"></td>
          <td class="px-4 py-3">
            <span th:text="${m.tipo}"
                  th:classappend="${m.tipo.name() == 'INGRESO'} ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'"
                  class="px-2 py-1 rounded-full text-xs font-semibold"></span>
          </td>
          <td class="px-4 py-3 text-right font-semibold"
              th:classappend="${m.tipo.name() == 'INGRESO'} ? 'text-green-600' : 'text-red-600'"
              th:text="${#numbers.formatDecimal(m.importe, 1, 2)} + ' €'"></td>
          <td class="px-4 py-3 flex gap-2">
            <a th:href="@{/contabilidad/{id}/editar(id=${m.id})}"
               class="text-blue-600 hover:underline text-xs">Editar</a>
            <form th:action="@{/contabilidad/{id}/eliminar(id=${m.id})}" method="post"
                  onsubmit="return confirm('¿Eliminar movimiento?')">
              <button type="submit" class="text-red-500 hover:underline text-xs">Eliminar</button>
            </form>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(movimientos)}">
          <td colspan="6" class="px-4 py-8 text-center text-gray-400">
            No hay movimientos registrados.
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
</body>
</html>
