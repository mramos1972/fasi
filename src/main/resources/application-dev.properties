spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fasi_dev}
spring.datasource.username=${DB_USER:fasi}
spring.datasource.password=${DB_PASS:fasi}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.com.miempresa.fasi=DEBUG
